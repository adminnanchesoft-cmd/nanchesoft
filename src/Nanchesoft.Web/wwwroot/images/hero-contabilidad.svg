    <!-- Row 9 - level 1 -->
    <rect x="96" y="258" width="278" height="14" fill="white"/>
    <text x="104" y="269" fill="#0f172a" font-weight="700">300-00-000</text>
    <text x="184" y="269" fill="#0f172a" font-weight="700">CAPITAL</text>
