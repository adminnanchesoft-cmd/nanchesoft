    <text x="120" y="185" fill="#64748b">100-01-001</text>
    <text x="184" y="185" fill="#64748b">Caja general</text>
    <circle cx="335" cy="181" r="4" fill="#10b981"/>
    <!-- Row 4 -->
    <rect x="96" y="188" width="278" height="14" fill="#f8fafc"/>
