  <rect x="522" y="200" width="28" height="83" rx="4" fill="url(#glow2)" opacity="0.9"/>
  <!-- Pasivo -->
  <rect x="570" y="205" width="28" height="78" rx="4" fill="url(#glow1)" opacity="0.9"/>
  <rect x="602" y="220" width="28" height="63" rx="4" fill="url(#glow2)" opacity="0.9"/>
