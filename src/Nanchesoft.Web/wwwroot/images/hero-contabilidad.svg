    <text x="184" y="227" fill="#0f172a" font-weight="700">PASIVO</text>
    <circle cx="335" cy="223" r="4" fill="#10b981"/>
    <!-- Row 7 -->
    <rect x="96" y="230" width="278" height="14" fill="white"/>
    <text x="110" y="241" fill="#334155">200-01-000</text>
    <text x="184" y="241" fill="#334155">Proveedores</text>
    <circle cx="335" cy="237" r="4" fill="#10b981"/>
    <!-- Row 8 -->
    <rect x="96" y="244" width="278" height="14" fill="#f8fafc"/>
    <text x="110" y="255" fill="#334155">200-02-000</text>
    <text x="184" y="255" fill="#334155">Impuestos x pagar</text>
