  <text x="810" y="234" fill="rgba(255,255,255,0.5)" font-family="system-ui" font-size="10" letter-spacing="1">PÓLIZAS MES</text>
  <text x="810" y="266" fill="#3b82f6" font-family="system-ui" font-size="34" font-weight="900">84</text>
  <text x="856" y="288" fill="rgba(59,130,246,0.5)" font-family="system-ui" font-size="9">4 pendientes</text>

